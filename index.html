<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>두지 스트레스 박살 테트리스</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f2ede3;
  --panel: #e8e2d6;
  --accent: #2ec4a9;
  --accent2: #1a9c84;
  --border: #c9c2b4;
  --text: #1a7a6a;
  --muted: #8a9e98;
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

/* ── 전체 레이아웃 ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── 상단 HUD ── */
#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 6px;
}
.hud-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}
.hud-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.hud-val   { font-size: 18px; font-weight: 700; color: var(--accent2); line-height: 1.2; }
#hud-pause {
  background: none; border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
  padding: 4px 10px; font-size: 18px; cursor: pointer;
  transition: background .15s;
}
#hud-pause:active { background: var(--border); }

/* ── 게임 영역 ── */
#game-area {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* 두지 + 아이템 사이드바 */
#sidebar {
  width: 76px;
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
#duji-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 4px 4px;
  position: relative;
}
#duji-bubble {
  position: absolute;
  top: 6px; left: 2px; right: 2px;
  background: #fff;
  color: #111;
  border: 2px solid #333;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  text-align: center;
  padding: 4px 5px;
  line-height: 1.3;
  opacity: 0;
  transition: opacity .3s;
  z-index: 5;
}
#duji-bubble::after {
  content:''; position: absolute;
  bottom: -8px; left: 50%; transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: #333;
}
#duji-bubble.show { opacity: 1; }
#duji-svg { width: 60px; height: 80px; transition: transform .1s; }

#item-panel {
  border-top: 1px solid var(--border);
  padding: 6px 4px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  align-items: center;
}
.item-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.islot {
  width: 48px; height: 48px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  position: relative;
}
.islot.active { border-color: var(--accent2); }
.islot:active { transform: scale(.9); }
.islot .itip {
  position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: var(--accent2); white-space: nowrap; display: none;
}
.islot:hover .itip { display: block; }

/* 캔버스 */
#canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#game-canvas { display: block; border: 2px solid var(--border); background: #faf7f2; }

/* 넥스트 패널 */
#next-panel {
  width: 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 8px 4px;
  gap: 8px;
  flex-shrink: 0;
}
.next-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
#next-canvas { background: #fff; border-radius: 6px; border: 1px solid var(--border); }

/* ── 컨트롤 ── */
#controls {
  background: var(--panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding: 10px 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.cbtn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .1s, transform .1s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.cbtn:active { background: var(--accent); color: #fff; transform: scale(.9); border-color: var(--accent); }
/* 왼쪽: 회전 */
#btn-rotate { width: 68px; height: 68px; font-size: 28px; }
/* 가운데: 드롭 */
#btn-drop {
  width: 46px; height: 46px; font-size: 16px;
  background: var(--accent); border-color: var(--accent);
  color: #fff; border-radius: 50%;
  flex-direction: column; gap: 0; line-height: 1;
}
#btn-drop span { font-size: 8px; font-weight: 700; }
#btn-drop:active { background: var(--accent2); transform: scale(.9); }
/* 오른쪽: 삼각 방향 배열 */
#arrow-cluster { display: flex; flex-direction: column; gap: 6px; align-items: center; }
#arrow-top { display: flex; gap: 6px; }
#btn-left, #btn-right { width: 56px; height: 52px; font-size: 22px; }
#btn-down { width: 56px; height: 44px; font-size: 20px; }

/* ── 오버레이 공통 ── */
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 20;
  background: rgba(242,237,227,.95);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.overlay.show { display: flex; }
.overlay h1 { font-size: 28px; margin-bottom: 6px; }
.overlay .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.big-btn {
  display: block; width: 100%; max-width: 240px;
  padding: 16px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 14px;
  font-size: 18px; font-weight: 700;
  cursor: pointer; margin: 8px auto;
  transition: transform .1s, background .1s;
  text-decoration: none;
  text-align: center;
}
.big-btn:active { transform: scale(.96); }
.big-btn.secondary {
  background: var(--panel); border: 1.5px solid var(--border);
  color: var(--text); font-size: 15px;
}
.score-big { font-size: 36px; font-weight: 700; color: var(--accent2); margin: 8px 0 16px; }

/* 시작 화면 두지 */
#start-duji { width: 100px; height: 130px; margin-bottom: 16px; }

/* 아이템 팝업 */
#item-popup {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #fff;
  border: 3px solid var(--accent2);
  border-radius: 16px;
  padding: 18px 26px;
  text-align: center;
  z-index: 30;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
#item-popup.show { transform: translate(-50%, -50%) scale(1); }
#item-popup-icon { font-size: 36px; }
#item-popup-name { font-size: 13px; font-weight: 700; color: #333; margin-top: 4px; }

/* 일시정지 오버레이 */
#pause-overlay {
  display: none;
  position: absolute;
  inset: 0; z-index: 25;
  background: rgba(242,237,227,.92);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#pause-overlay.show { display: flex; }
#pause-overlay h2 { font-size: 26px; }

/* ── 아이템 애니메이션 레이어 ── */
#anim-layer {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 15;
  overflow: hidden;
}
/* 물풍선 */
@keyframes waterDrop {
  0%   { transform: translateY(-20px) scale(.5); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110%) scale(1.2); opacity: 0; }
}
@keyframes splash {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
}
.water-drop {
  position: absolute; font-size: 22px; animation: waterDrop .7s ease-in forwards;
}
.splash-ring {
  position: absolute; width: 60px; height: 60px;
  border: 4px solid #4fc3f7; border-radius: 50%;
  top: 50%; left: 50%;
  animation: splash .6s ease-out forwards;
}
/* 시계 */
@keyframes clockRing {
  0%,100% { transform: translate(-50%,-50%) rotate(0) scale(1); }
  10%      { transform: translate(-50%,-50%) rotate(-18deg) scale(1.15); }
  30%      { transform: translate(-50%,-50%) rotate(18deg) scale(1.2); }
  50%      { transform: translate(-50%,-50%) rotate(-14deg) scale(1.15); }
  70%      { transform: translate(-50%,-50%) rotate(10deg) scale(1.1); }
  90%      { transform: translate(-50%,-50%) rotate(-6deg) scale(1.05); }
}
@keyframes clockFade {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(.5); }
}
#clock-anim {
  position: absolute; top: 40%; left: 50%;
  font-size: 72px; line-height: 1;
  transform: translate(-50%,-50%);
  animation: clockRing .7s ease-in-out, clockFade .4s .7s forwards;
}
/* 레고랜드 불 */
@keyframes fireRise {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translateY(-60px) scale(.4); opacity: 0; }
}
.fire-particle {
  position: absolute; font-size: 28px;
  animation: fireRise .8s ease-out forwards;
}
/* 두지 분노 펀치 */
@keyframes dujiPunch {
  0%   { transform: translateX(-120%) rotate(-10deg) scale(1.2); opacity: 1; }
  60%  { transform: translateX(10%) rotate(5deg) scale(1.4); opacity: 1; }
  80%  { transform: translateX(20%) rotate(0deg) scale(1.3); opacity: 1; }
  100% { transform: translateX(150%) rotate(15deg) scale(.8); opacity: 0; }
}
#duji-punch {
  position: absolute; top: 20%; left: 0;
  width: 90px; height: 120px;
  animation: dujiPunch .9s cubic-bezier(.25,.46,.45,.94) forwards;
}
@keyframes blockShatter {
  0%   { opacity: 1; transform: translate(0,0) rotate(0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.2); }
}
.shard {
  position: absolute;
  border-radius: 3px;
  animation: blockShatter .6s ease-out forwards;
}
</style>
</head>
<body>

<script>
// ── 상수 ──
const COLS = 10, ROWS = 20;
let BS = 28; // block size, 동적 계산

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold-canvas');
const hCtx = holdCanvas.getContext('2d');

function calcSize() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth - 4;
  const maxH = wrap.clientHeight - 4;
  BS = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  canvas.width = BS * COLS;
  canvas.height = BS * ROWS;
}

// ── 테트로미노 ──
const PIECES = [
  { shape:[[1,1,1,1]], color:'#00d4ff' },
  { shape:[[1,1],[1,1]], color:'#ffe600' },
  { shape:[[0,1,0],[1,1,1]], color:'#c77dff' },
  { shape:[[1,0,0],[1,1,1]], color:'#ff9f1c' },
  { shape:[[0,0,1],[1,1,1]], color:'#4cc9f0' },
  { shape:[[0,1,1],[1,1,0]], color:'#06d6a0' },
  { shape:[[1,1,0],[0,1,1]], color:'#ff4d6d' },
];

// ── 아이템 ──
const ITEMS = [
  { id:'water', icon:'💧', name:'물풍선', desc:'맨 아래 줄 삭제!', prob:.20 },
  { id:'clock', icon:'⏰', name:'시계',   desc:'8초간 슬로우~',   prob:.10 },
  { id:'lego',  icon:'🧱', name:'레고랜드',desc:'아래 절반 박살!', prob:.05 },
  { id:'rage',  icon:'🔥', name:'두지의 분노',desc:'전체 박살!!', prob:.03 },
];

// ── 두지 반응 ──
const REACTIONS = [
  {t:'야호! 👏',      a:'jump'},  {t:'박살났다! 💥', a:'shake'},
  {t:'스트레스 해소~',a:'sigh'},  {t:'으랴랴! 💪',  a:'punch'},
  {t:'두지 최고! ⭐', a:'star'},  {t:'뻥! 터졌다!',  a:'explode'},
  {t:'ㅋㅋ 박살!',    a:'laugh'}, {t:'한 번 더! 🔥', a:'fire'},
  {t:'완전 박살! 💣', a:'bomb'},  {t:'두지 신났다!🎉',a:'party'},
  {t:'없애버렸다! 🗑️',a:'trash'}, {t:'후련해~ 😤',   a:'spin'},
];

// ── 상태 ──
let board, current, next, held, canHold;
let score, lines, level, gameOver, paused;
let dropInterval, slowMode, lastTime, dropCounter, raf;
let inventory, speechTimer;

// ── 초기화 ──
function startGame() {
  board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  score=0; lines=0; level=1; gameOver=false; paused=false;
  dropInterval=800; slowMode=false; dropCounter=0; lastTime=0;
  inventory=[null,null,null]; held=null; canHold=true;
  calcSize();
  document.getElementById('start-overlay').classList.remove('show');
  document.getElementById('over-overlay').classList.remove('show');
  document.getElementById('pause-overlay').classList.remove('show');
  updateHUD(); updateItemUI();
  current = mkPiece(); next = mkPiece();
  drawNext(); drawHold();
  if(raf) cancelAnimationFrame(raf);
  lastTime = performance.now();
  raf = requestAnimationFrame(loop);
  showBubble('레고 박살내자! 💥'); animDuji('party');
}

function mkPiece() {
  const p = PIECES[Math.floor(Math.random()*PIECES.length)];
  return { shape:p.shape.map(r=>[...r]), color:p.color,
           x:Math.floor(COLS/2)-Math.floor(p.shape[0].length/2), y:0 };
}

// ── 충돌 ──
function hits(piece, dx=0, dy=0, sh=null) {
  const s = sh || piece.shape;
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++) {
    if(!s[r][c]) continue;
    const nx=piece.x+c+dx, ny=piece.y+r+dy;
    if(nx<0||nx>=COLS||ny>=ROWS) return true;
    if(ny>=0&&board[ny][nx]) return true;
  }
  return false;
}

function rotate90(s) { return s[0].map((_,i)=>s.map(r=>r[i]).reverse()); }

// ── 이동 ──
function mLeft()  { if(!hits(current,-1)) current.x--; draw(); }
function mRight() { if(!hits(current, 1)) current.x++; draw(); }
function mDown()  {
  if(!hits(current,0,1)) { current.y++; dropCounter=0; }
  else lock();
  draw();
}
function mDrop()  { while(!hits(current,0,1)) current.y++; lock(); draw(); }
function mRotate(){
  const r=rotate90(current.shape);
  if(!hits(current,0,0,r)) current.shape=r;
  else if(!hits(current,1,0,r)){current.shape=r;current.x++;}
  else if(!hits(current,-1,0,r)){current.shape=r;current.x--;}
  draw();
}
function mHold() {
  if(!canHold) return;
  canHold=false;
  if(held) { const tmp=held; held={shape:current.shape.map(r=>[...r]),color:current.color}; current={...tmp,x:Math.floor(COLS/2)-Math.floor(tmp.shape[0].length/2),y:0}; }
  else { held={shape:current.shape.map(r=>[...r]),color:current.color}; current=next; next=mkPiece(); drawNext(); }
  drawHold(); draw();
}

// ── 고정 ──
function lock() {
  for(let r=0;r<current.shape.length;r++) for(let c=0;c<current.shape[r].length;c++) {
    if(!current.shape[r][c]) continue;
    const ny=current.y+r;
    if(ny<0){endGame();return;}
    board[ny][current.x+c]=current.color;
  }
  canHold=true;
  clearLines();
  current=next; next=mkPiece(); drawNext();
  if(hits(current)){endGame();}
}

function clearLines() {
  let n=0;
  for(let r=ROWS-1;r>=0;r--) {
    if(board[r].every(c=>c!==0)){board.splice(r,1);board.unshift(Array(COLS).fill(0));n++;r++;}
  }
  if(n>0){
    score+=[0,100,300,500,800][n]*level;
    lines+=n; level=Math.floor(lines/10)+1;
    dropInterval=slowMode?1400:Math.max(100,800-(level-1)*70);
    updateHUD();
    const rx=REACTIONS[Math.floor(Math.random()*REACTIONS.length)];
    showBubble(rx.t); animDuji(rx.a);
    tryItemDrop(n);
  }
}

function tryItemDrop(n) {
  for(let i=0;i<n;i++){
    for(const item of ITEMS){
      if(Math.random()<item.prob){addItem(item);break;}
    }
  }
}

function addItem(item) {
  const s=inventory.findIndex(x=>x===null);
  if(s===-1)return;
  inventory[s]=item; updateItemUI();
  const pop=document.getElementById('item-popup');
  document.getElementById('item-popup-icon').textContent=item.icon;
  document.getElementById('item-popup-name').textContent=item.name+' 획득!';
  pop.classList.add('show');
  setTimeout(()=>pop.classList.remove('show'),1400);
}

function useItem(i) {
  const item=inventory[i]; if(!item)return;
  inventory[i]=null; updateItemUI();
  playItemAnim(item.id, ()=>{
    if(item.id==='water'){
      for(let r=ROWS-1;r>=0;r--){if(board[r].some(c=>c!==0)){board.splice(r,1);board.unshift(Array(COLS).fill(0));break;}}
      showBubble('💧 한 줄 날렸다!'); animDuji('explode');
    } else if(item.id==='clock'){
      slowMode=true; dropInterval=1400;
      showBubble('⏰ 느리게~ 느리게~'); animDuji('sigh');
      setTimeout(()=>{slowMode=false;dropInterval=Math.max(100,800-(level-1)*70);},8000);
    } else if(item.id==='lego'){
      for(let r=Math.floor(ROWS/2);r<ROWS;r++) board[r]=Array(COLS).fill(0);
      showBubble('🧱 레고랜드 도움!'); animDuji('bomb');
    } else if(item.id==='rage'){
      board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
      showBubble('🔥 두지의 분노!!'); animDuji('fire');
    }
    updateHUD(); draw();
  });
}

function playItemAnim(id, cb) {
  const layer = document.getElementById('anim-layer');
  const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
  const cl = canvas.offsetLeft, ct = canvas.offsetTop;
  layer.innerHTML = '';

  if(id==='water') {
    // 물방울 여러 개 낙하
    for(let i=0;i<14;i++){
      const d=document.createElement('div');
      d.className='water-drop'; d.textContent='💧';
      d.style.left=(cl + 10 + Math.random()*(cw-20))+'px';
      d.style.top=ct+'px';
      d.style.animationDelay=(Math.random()*.35)+'s';
      d.style.fontSize=(16+Math.random()*14)+'px';
      layer.appendChild(d);
    }
    // 중앙 splash 링
    for(let i=0;i<3;i++){
      const s=document.createElement('div');
      s.className='splash-ring';
      s.style.left=(cl+cw/2)+'px'; s.style.top=(ct+ch*.6)+'px';
      s.style.animationDelay=(i*.12)+'s';
      layer.appendChild(s);
    }
    setTimeout(()=>{layer.innerHTML='';cb();},900);

  } else if(id==='clock') {
    const d=document.createElement('div');
    d.id='clock-anim'; d.textContent='⏰';
    d.style.left=(cl+cw/2)+'px'; d.style.top=(ct+ch*.4)+'px';
    layer.appendChild(d);
    setTimeout(()=>{layer.innerHTML='';cb();},1200);

  } else if(id==='lego') {
    // 아래 절반에 불 파티클
    const half=Math.floor(ROWS/2);
    const fireEmoji=['🔥','🔥','🔥','💥','🌟'];
    for(let i=0;i<28;i++){
      const f=document.createElement('div');
      f.className='fire-particle';
      f.textContent=fireEmoji[Math.floor(Math.random()*fireEmoji.length)];
      f.style.left=(cl+Math.random()*cw)+'px';
      f.style.top=(ct+half*BS+Math.random()*(ch-half*BS))+'px';
      f.style.animationDelay=(Math.random()*.6)+'s';
      f.style.fontSize=(20+Math.random()*16)+'px';
      layer.appendChild(f);
    }
    setTimeout(()=>{layer.innerHTML='';cb();},1100);

  } else if(id==='rage') {
    // 보드의 블록들을 파편으로 표현
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      if(!board[r][c]) continue;
      const s=document.createElement('div');
      s.className='shard';
      s.style.left=(cl+c*BS+2)+'px';
      s.style.top=(ct+r*BS+2)+'px';
      s.style.width=(BS-4)+'px'; s.style.height=(BS-4)+'px';
      s.style.background=board[r][c];
      const angle=Math.random()*360;
      const dist=40+Math.random()*80;
      s.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
      s.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');
      s.style.setProperty('--rot',(Math.random()*720-360)+'deg');
      s.style.animationDelay=(Math.random()*.15)+'s';
      layer.appendChild(s);
    }
    // 두지 SVG 펀치
    const punch=document.createElement('div');
    punch.id='duji-punch';
    punch.style.left=cl+'px'; punch.style.top=(ct+ch*.15)+'px';
    punch.innerHTML=document.getElementById('duji-svg').outerHTML;
    layer.appendChild(punch);
    setTimeout(()=>{layer.innerHTML='';cb();},1000);

  } else {
    cb();
  }
}

// ── 게임오버 ──
function endGame() {
  gameOver=true;
  cancelAnimationFrame(raf);
  document.getElementById('final-score').textContent=score.toLocaleString()+'점';
  document.getElementById('over-overlay').classList.add('show');
}

// ── 그리기 ──
function legoBlock(c2d, x, y, sz, color) {
  const p=1;
  c2d.fillStyle=color;
  c2d.fillRect(x+p,y+p,sz-p*2,sz-p*2);
  c2d.fillStyle='rgba(255,255,255,.38)';
  c2d.fillRect(x+p,y+p,sz-p*2,3);
  c2d.fillRect(x+p,y+p,3,sz-p*2);
  c2d.fillStyle='rgba(0,0,0,.32)';
  c2d.fillRect(x+p,y+sz-p-3,sz-p*2,3);
  c2d.fillRect(x+sz-p-3,y+p,3,sz-p*2);
  const cr=sz*.17;
  c2d.beginPath();c2d.arc(x+sz/2,y+sz/2,cr,0,Math.PI*2);
  c2d.fillStyle='rgba(255,255,255,.28)';c2d.fill();
  c2d.strokeStyle='rgba(0,0,0,.35)';c2d.lineWidth=.8;c2d.stroke();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) ctx.strokeRect(c*BS,r*BS,BS,BS);
  // board
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]) legoBlock(ctx,c*BS,r*BS,BS,board[r][c]);
  if(!current)return;
  // current
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)legoBlock(ctx,(current.x+c)*BS,(current.y+r)*BS,BS,current.color);}));
}

function drawMini(c2d, piece) {
  c2d.clearRect(0,0,58,58);
  if(!piece)return;
  const ns=Math.floor(58/Math.max(piece.shape.length,piece.shape[0].length));
  const ox=Math.floor((58-piece.shape[0].length*ns)/2);
  const oy=Math.floor((58-piece.shape.length*ns)/2);
  piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)legoBlock(c2d,ox+c*ns,oy+r*ns,ns,piece.color);}));
}
function drawNext() { drawMini(nCtx,next); }
function drawHold() { drawMini(hCtx,held?{shape:held.shape,color:held.color}:null); }

// ── HUD ──
function updateHUD() {
  document.getElementById('score-display').textContent=score.toLocaleString();
  document.getElementById('level-display').textContent=level;
  document.getElementById('lines-display').textContent=lines;
}
function updateItemUI() {
  for(let i=0;i<3;i++){
    const el=document.getElementById('isl'+i);
    const item=inventory[i];
    el.childNodes[0].textContent=item?item.icon:'—';
    el.querySelector('.itip').textContent=item?item.name:'';
    el.classList.toggle('active',!!item);
  }
}

// ── 두지 ──
function showBubble(text) {
  const b=document.getElementById('duji-bubble');
  b.textContent=text; b.classList.add('show');
  if(speechTimer)clearTimeout(speechTimer);
  speechTimer=setTimeout(()=>b.classList.remove('show'),2200);
}
function animDuji(anim) {
  const svg=document.getElementById('duji-svg');
  const seq={
    jump: [{t:'translateY(-14px) scale(1.1)',d:130},{t:'translateY(0)',d:130}],
    shake:[{t:'translateX(-8px)',d:70},{t:'translateX(8px)',d:70},{t:'translateX(-4px)',d:70},{t:'translateX(0)',d:70}],
    spin: [{t:'rotate(12deg)',d:90},{t:'rotate(-12deg)',d:90},{t:'rotate(0)',d:90}],
    punch:[{t:'translateX(10px) scale(1.15)',d:90},{t:'translateX(0) scale(1)',d:90}],
    explode:[{t:'scale(1.35)',d:90},{t:'scale(.88)',d:90},{t:'scale(1)',d:90}],
    star: [{t:'scale(1.2) rotate(10deg)',d:130},{t:'scale(1) rotate(0)',d:130}],
    sigh: [{t:'translateY(6px)',d:180},{t:'translateY(0)',d:180}],
    laugh:[{t:'rotate(-5deg) scale(1.1)',d:90},{t:'rotate(5deg) scale(1.1)',d:90},{t:'rotate(0) scale(1)',d:90}],
    trash:[{t:'translateY(-5px) rotate(10deg)',d:110},{t:'translateY(0) rotate(0)',d:110}],
    fire: [{t:'scale(1.28)',d:75},{t:'scale(1)',d:75},{t:'scale(1.18)',d:75},{t:'scale(1)',d:75}],
    bomb: [{t:'scale(1.4) rotate(4deg)',d:110},{t:'scale(.85) rotate(-4deg)',d:110},{t:'scale(1) rotate(0)',d:110}],
    party:[{t:'translateY(-10px) rotate(-10deg)',d:90},{t:'translateY(0) rotate(10deg)',d:90},{t:'rotate(0)',d:90}],
  };
  const steps=seq[anim]||seq.jump;
  let i=0;
  function run(){if(i>=steps.length){svg.style.transform='';return;}svg.style.transform=steps[i].t;setTimeout(run,steps[i].d);i++;}
  run();
}

// ── 일시정지 ──
function togglePause() {
  if(gameOver)return;
  paused=!paused;
  document.getElementById('pause-overlay').classList.toggle('show',paused);
  document.getElementById('hud-pause').textContent=paused?'▶':'⏸';
  if(!paused){lastTime=performance.now();raf=requestAnimationFrame(loop);}
}

// ── 루프 ──
function loop(time) {
  if(gameOver||paused)return;
  const dt=time-lastTime; lastTime=time;
  dropCounter+=dt;
  if(dropCounter>dropInterval){mDown();dropCounter=0;}
  draw();
  raf=requestAnimationFrame(loop);
}

// ── 키보드 ──
document.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(e.key==='p'||e.key==='Escape'){togglePause();return;}
  if(paused)return;
  ({ArrowLeft:mLeft,ArrowRight:mRight,ArrowDown:mDown,ArrowUp:mRotate,' ':mDrop,'c':mHold,'C':mHold,'z':mHold,'Z':mHold,'1':()=>useItem(0),'2':()=>useItem(1),'3':()=>useItem(2)})[e.key]?.();
  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
});

// ── 터치 버튼 ──
function bindBtn(id, fn) {
  const el=document.getElementById(id);
  let iv=null;
  const rep=['btn-left','btn-right','btn-down'].includes(id);
  const start=(e)=>{e.preventDefault();if(paused||gameOver)return;fn();if(rep)iv=setInterval(()=>{if(!paused&&!gameOver)fn();},100);};
  const end=()=>{if(iv){clearInterval(iv);iv=null;}};
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchend',end);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',end);
}
bindBtn('btn-left',mLeft);
bindBtn('btn-right',mRight);
bindBtn('btn-down',mDown);
bindBtn('btn-rotate',mRotate);
bindBtn('btn-drop',mDrop);

// 스와이프
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){dx>0?mRight():mLeft();}
  else if(dy>40){mDrop();}
  else if(dy<-20){mRotate();}
  draw();
},{passive:true});

// 리사이즈
window.addEventListener('resize',()=>{if(!gameOver){calcSize();draw();}});
</script>
